# ─────────────────────────────────────────────────────────────────────────
# VLM judge configuration — used by Phase 2 (calibration) and Phase 3
# (full evaluation of the base model's 3600 generated images).
# ─────────────────────────────────────────────────────────────────────────

judge:
  model_id: "Qwen/Qwen2.5-VL-7B-Instruct"
  dtype: "bfloat16"               
  max_new_tokens: 32              

input:
  manifest_path: "data/eval_images/manifest.csv"

output:
  root: "data/judgments"
  judgments_filename: "judgments.csv"

pairs:
  taxonomy_path: "configs/objects_colors.yaml"
